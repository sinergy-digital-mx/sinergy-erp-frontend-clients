<div class="customer-modal">
  <div class="customer-modal__header">
    <h2>{{ isCreateMode() ? 'Crear Cliente' : 'Editar Cliente' }}</h2>
    <lucide-icon
      [img]="X"
      class="close cursor-pointer"
      (click)="closeDialog()">
    </lucide-icon>
  </div>

  <div class="customer-modal__body">
    <form [formGroup]="form">
      <!-- Nombre -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
        <input
          type="text"
          formControlName="name"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Nombre">
      </div>

      <!-- Apellido -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
        <input
          type="text"
          formControlName="lastname"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Apellido">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Email">
      </div>

      <!-- Teléfono -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
        <input
          type="text"
          formControlName="phone"
          appPhoneDigits
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Teléfono">
      </div>

      <!-- Código Teléfono -->
      <div>
        <app-phone-code-select
          [control]="getPhoneCodeControl()">
        </app-phone-code-select>
      </div>

      <!-- País -->
      <div>
        <app-phone-country-select
          [control]="getPhoneCountryControl()">
        </app-phone-country-select>
      </div>

      <!-- Empresa (full width) -->
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Empresa</label>
        <input
          type="text"
          formControlName="company_name"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Empresa">
      </div>

      <!-- Grupo (full width) -->
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Grupo</label>
        <app-customer-group-dropdown
          [selectedGroupId]="selectedGroup()?.id || null"
          [disabled]="loading()"
          (groupSelect)="onGroupSelected($event)">
        </app-customer-group-dropdown>
      </div>
    </form>
  </div>

  <div class="customer-modal__footer">
    <app-button
      text="Cancelar"
      custom_class="btn_secondary"
      (clicked)="closeDialog()">
    </app-button>
    <app-button
      [text]="isCreateMode() ? 'Crear' : 'Actualizar'"
      custom_class="btn_primary"
      [loading]="loading()"
      (clicked)="submit()">
    </app-button>
  </div>
</div>
