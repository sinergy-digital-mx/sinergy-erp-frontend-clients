<div class="dialog">
  <div class="dialog__header">
    <h2>Gestionar Categorías</h2>
    <button (click)="close()" class="close">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>

  <div class="tabs">
    <button 
      class="tab"
      [class.active]="activeTab() === 'categories'"
      (click)="activeTab.set('categories')">
      Categorías
    </button>
    <button 
      class="tab"
      [class.active]="activeTab() === 'subcategories'"
      (click)="activeTab.set('subcategories')"
      [disabled]="!selectedCategoryId()">
      Subcategorías
    </button>
  </div>

  <div class="dialog__body">
    <!-- Categories Tab -->
    <div class="tab-content" [class.active]="activeTab() === 'categories'">
      <!-- Create Button -->
      <div *ngIf="!isCreating()" class="header-actions">
        <button (click)="startCreating()" class="create-btn">
          + Crear Nueva
        </button>
      </div>

      <!-- Create Form -->
      <form *ngIf="isCreating()" [formGroup]="form" class="create-form">
        <div>
          <label class="form-label">Nombre</label>
          <input type="text" formControlName="name" class="form-input" placeholder="Nombre de la categoría" />
        </div>
        <div>
          <label class="form-label">Descripción</label>
          <textarea formControlName="description" class="form-input" rows="2" placeholder="Descripción opcional"></textarea>
        </div>
        <div class="form-actions">
          <button (click)="cancelCreating()" type="button" class="btn btn--secondary">
            Cancelar
          </button>
          <button (click)="saveCategory()" [disabled]="form.invalid || saving()" class="btn btn--primary">
            {{ saving() ? 'Guardando...' : 'Guardar' }}
          </button>
        </div>
      </form>

      <!-- Categories List -->
      <div *ngIf="!isCreating()" class="items-list">
        <div *ngIf="categories().length === 0" class="empty-state">
          <p>No hay categorías</p>
        </div>

        <div *ngFor="let cat of categories()" class="item-card">
          <div *ngIf="editingCategoryId() !== cat.id" class="item-view">
            <div class="item-info" (click)="selectCategory(cat.id)">
              <p class="item-name">{{ cat.name }}</p>
              <p class="item-description">{{ cat.description }}</p>
            </div>
            <div class="item-actions">
              <button (click)="startEditingCategory(cat)" class="icon-btn" title="Editar">
                <i class="fi fi-rr-pencil"></i>
              </button>
              <button (click)="deleteCategory(cat)" [disabled]="saving()" class="icon-btn icon-btn--danger" title="Eliminar">
                <i class="fi fi-rr-trash"></i>
              </button>
            </div>
          </div>

          <!-- Edit Mode -->
          <div *ngIf="editingCategoryId() === cat.id" class="item-edit">
            <div>
              <label class="form-label">Nombre</label>
              <input type="text" [(ngModel)]="editingCategoryForm[cat.id].name" class="form-input form-input--sm" />
            </div>
            <div>
              <label class="form-label">Descripción</label>
              <textarea [(ngModel)]="editingCategoryForm[cat.id].description" class="form-input form-input--sm" rows="2"></textarea>
            </div>
            <div class="form-actions">
              <button (click)="cancelEditingCategory()" type="button" class="btn btn--sm btn--secondary">
                Cancelar
              </button>
              <button (click)="saveEditCategory(cat)" [disabled]="saving()" class="btn btn--sm btn--primary">
                {{ saving() ? 'Guardando...' : 'Guardar' }}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Subcategories Tab -->
    <div class="tab-content" [class.active]="activeTab() === 'subcategories'">
      <!-- Create Button -->
      <div *ngIf="!isCreatingSubcategory()" class="header-actions">
        <button (click)="startCreatingSubcategory()" class="create-btn">
          + Crear Nueva
        </button>
      </div>

      <!-- Create Form -->
      <form *ngIf="isCreatingSubcategory()" [formGroup]="form" class="create-form">
        <div>
          <label class="form-label">Nombre</label>
          <input type="text" formControlName="name" class="form-input" placeholder="Nombre de la subcategoría" />
        </div>
        <div>
          <label class="form-label">Descripción</label>
          <textarea formControlName="description" class="form-input" rows="2" placeholder="Descripción opcional"></textarea>
        </div>
        <div class="form-actions">
          <button (click)="cancelCreatingSubcategory()" type="button" class="btn btn--secondary">
            Cancelar
          </button>
          <button (click)="saveSubcategory()" [disabled]="form.invalid || saving()" class="btn btn--primary">
            {{ saving() ? 'Guardando...' : 'Guardar' }}
          </button>
        </div>
      </form>

      <!-- Subcategories List -->
      <div *ngIf="!isCreatingSubcategory()" class="items-list">
        <div *ngIf="subcategories().length === 0" class="empty-state">
          <p>No hay subcategorías</p>
        </div>

        <div *ngFor="let subcat of subcategories()" class="item-card">
          <div *ngIf="editingSubcategoryId() !== subcat.id" class="item-view">
            <div class="item-info">
              <p class="item-name">{{ subcat.name }}</p>
              <p class="item-description">{{ subcat.description }}</p>
            </div>
            <div class="item-actions">
              <button (click)="startEditingSubcategory(subcat)" class="icon-btn" title="Editar">
                <i class="fi fi-rr-pencil"></i>
              </button>
              <button (click)="deleteSubcategory(subcat)" [disabled]="saving()" class="icon-btn icon-btn--danger" title="Eliminar">
                <i class="fi fi-rr-trash"></i>
              </button>
            </div>
          </div>

          <!-- Edit Mode -->
          <div *ngIf="editingSubcategoryId() === subcat.id" class="item-edit">
            <div>
              <label class="form-label">Nombre</label>
              <input type="text" [(ngModel)]="editingSubcategoryForm[subcat.id].name" class="form-input form-input--sm" />
            </div>
            <div>
              <label class="form-label">Descripción</label>
              <textarea [(ngModel)]="editingSubcategoryForm[subcat.id].description" class="form-input form-input--sm" rows="2"></textarea>
            </div>
            <div class="form-actions">
              <button (click)="cancelEditingSubcategory()" type="button" class="btn btn--sm btn--secondary">
                Cancelar
              </button>
              <button (click)="saveEditSubcategory(subcat)" [disabled]="saving()" class="btn btn--sm btn--primary">
                {{ saving() ? 'Guardando...' : 'Guardar' }}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="dialog__footer">
    <button (click)="close()" class="btn btn--secondary">
      Cerrar
    </button>
  </div>
</div>
