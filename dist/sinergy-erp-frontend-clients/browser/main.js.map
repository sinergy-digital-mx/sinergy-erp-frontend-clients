<div class="flex flex-col h-screen overflow-hidden">
  <header class="mobile-header flex items-center gap-3 px-4 py-3 bg-gradient-to-r from-indigo-950 via-indigo-900 to-purple-900 text-white lg:hidden shrink-0">
    <button
      type="button"
      class="mobile-menu-btn"
      (click)="openMobileMenu()"
      aria-label="Abrir menú">
      <lucide-icon [img]="icons.Menu" class="w-5 h-5"></lucide-icon>
    </button>
    <app-pollux-brand-text />
  </header>

  <div class="flex flex-1 min-h-0 overflow-hidden">
    <app-sidebar class="lg:h-full lg:overflow-y-auto shrink-0"></app-sidebar>
    <main class="flex-1 p-2 sm:p-4 bg-gray-100 overflow-y-auto min-w-0">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
