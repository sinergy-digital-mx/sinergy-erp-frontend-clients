<div class="settings-list-page px-4 pb-6">
  <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-4">
    <h2 class="text-2xl font-semibold text-gray-800">Almacenes</h2>

    <div class="flex items-center gap-3">
      <app-search
        class="w-64"
        [param_activate]="false"
        (searchChange)="onSearchChange($event)">
      </app-search>

      <app-button
        text="Nuevo Almacén"
        custom_class="btn_primary"
        (clicked)="openCreateWarehouseModal()">
      </app-button>
    </div>
  </div>

  <app-datatable-wrapper
    variant="settings"
    [config]="table_config()"
    [rowTemplate]="tableTemplate"
    (rowClick)="viewDetail($event.data)">
  </app-datatable-wrapper>
</div>

<ng-template #tableTemplate let-item="$implicit">
  <td>
    <p class="settings-cell-primary truncate">{{ item.name }}</p>
  </td>
  <td>
    <span class="settings-badge settings-badge--code">{{ item.code }}</span>
  </td>
  <td>
    <span [class]="item.country ? 'settings-cell-text' : 'settings-cell-empty'">{{ item.country || '—' }}</span>
  </td>
  <td>
    <span [class]="item.state ? 'settings-cell-text' : 'settings-cell-empty'">{{ item.state || '—' }}</span>
  </td>
  <td>
    <span class="settings-badge" [ngClass]="getStatusClass(item.status)">
      {{ getStatusLabel(item.status) }}
    </span>
  </td>
</ng-template>
