<!-- Users Management Container with Two-Column Layout -->
<div class="h-screen flex flex-col overflow-hidden">
  <!-- Header with Back Button -->
  <div class="flex items-center gap-3 justify-between flex-shrink-0 px-3 py-3 border-b border-gray-200">
    <div class="flex items-center gap-3">
      <app-back-button (clicked)="goBackToSettings()"></app-back-button>
      <h1 class="text-2xl font-bold text-gray-900">Gestión de Usuarios</h1>
    </div>
    <app-button
      text="+ Crear Usuario"
      variant="primary"
      size="sm"
      [fullWidth]="false"
      (clicked)="openCreateUserDialog()">
    </app-button>
  </div>

  <!-- Main Content -->
  <div class="flex gap-2 flex-1 min-h-0 px-2 py-2">
    <!-- Left Panel: User List -->
    <div class="w-1/3 bg-white border border-gray-200 rounded-lg flex flex-col h-full shadow-sm">
      <!-- Header -->
      <div class="px-3 py-2 border-b border-gray-200 flex-shrink-0">
        <h2 class="text-base font-semibold text-gray-900">Usuarios</h2>
      </div>

      <!-- Search and Filter Section -->
      <div class="px-3 py-2 border-b border-gray-200 space-y-2 flex-shrink-0">
        <!-- Search Input and Status Filter -->
        <app-user-search-filter></app-user-search-filter>
      </div>

      <!-- User List -->
      <div class="flex-1 overflow-y-auto min-h-0 user-cards-panel">
        @if (filteredUsers$ | async; as users) {
          @if (users.length === 0) {
            <div class="p-3 text-center text-gray-500 text-sm">
              <p>No se encontraron usuarios</p>
            </div>
          } @else {
            <div class="user-cards">
              @for (user of users; track user.id) {
                <button
                  type="button"
                  (click)="onUserSelected(user.id)"
                  class="user-card"
                  [class.user-card--selected]="(selectedUserId$ | async) === user.id">
                  <div class="user-card__avatar" aria-hidden="true">
                    {{ getUserInitials(user) }}
                  </div>
                  <div class="user-card__body">
                    <div class="user-card__top">
                      <p class="user-card__name">{{ getUserDisplayName(user) }}</p>
                      <span [class]="getStatusClass(user.status)">
                        {{ getNormalizedStatus(user.status) | titlecase }}
                      </span>
                    </div>
                    <p class="user-card__email">{{ user.email }}</p>
                    @if (user.is_pos_user || user.pos_user_code || getBillingBranchLabel(user)) {
                      <div class="user-card__meta">
                        @if (getPosTypeBadge(user); as posBadge) {
                          <span
                            class="user-card__tag user-card__tag--pos"
                            [class.user-card__tag--pos-cobranza]="user.pos_user_type === 'COBRANZA'">
                            {{ posBadge }}
                          </span>
                        }
                        @if (!user.is_pos_user && user.pos_user_code) {
                          <span class="user-card__tag user-card__tag--code">
                            Código: {{ user.pos_user_code }}
                          </span>
                        }
                        @if (getBillingBranchLabel(user); as branchLabel) {
                          <span class="user-card__tag user-card__tag--branch">{{ branchLabel }}</span>
                        }
                      </div>
                    }
                  </div>
                </button>
              }
            </div>
          }
        }
      </div>
    </div>

    <!-- Right Panel: User Details -->
    <div class="flex-1 min-h-0 overflow-hidden">
      @if (selectedUser$ | async; as user) {
        <app-user-details
            [user]="user"
            [userRoles$]="selectedUserRoles$"
            [availableRoles$]="roles$"
            [isLoadingRoles$]="isLoadingRoles$"
            (roleAssigned)="onRoleAssigned($event)"
            (roleReplaced)="onRoleReplaced($event)"
            (roleDeleted)="onRoleDeleted($event)"
            (userUpdated)="onUserUpdated()"
        ></app-user-details>
      } @else {
        <div class="flex items-center justify-center h-full bg-white">
          <div class="text-center">
            <p class="text-gray-500 text-lg">Selecciona un usuario para ver los detalles</p>
          </div>
        </div>
      }
    </div>
  </div>
</div>
