<div class="warehouse-modal">
  <div class="warehouse-modal__header">
    <h2>{{ isNew ? 'Nuevo Almacén' : 'Editar Almacén' }}</h2>
    <lucide-icon
      [img]="X"
      class="close cursor-pointer"
      (click)="close()">
    </lucide-icon>
  </div>

  <div class="warehouse-modal__body">
    <form [formGroup]="form">
      <!-- Nombre -->
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
        <input
          type="text"
          formControlName="name"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Nombre del almacén">
        <p *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="text-xs text-red-600 mt-1">
          Nombre requerido (mín. 2 caracteres)
        </p>
      </div>

      <!-- Código -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Código</label>
        <input
          type="text"
          formControlName="code"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 uppercase"
          placeholder="Ej: ALM-001">
      </div>

      <!-- Status -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <app-select
          [config]="statusSelectConfig"
          (changeOption)="onStatusChange($event)">
        </app-select>
      </div>

      <!-- Descripción -->
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
        <textarea
          formControlName="description"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Descripción del almacén"
          rows="2"></textarea>
      </div>

      <!-- Dirección -->
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Calle</label>
        <input
          type="text"
          formControlName="street"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Calle y número">
      </div>

      <!-- Ciudad y Estado -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
        <input
          type="text"
          formControlName="city"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Ciudad">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
        <input
          type="text"
          formControlName="state"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Estado">
      </div>

      <!-- País y CP -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">País</label>
        <app-select
          [config]="countrySelectConfig"
          (changeOption)="onCountryChange($event)">
        </app-select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">CP</label>
        <input
          type="text"
          formControlName="zip_code"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Código postal">
      </div>

      <!-- Sucursal -->
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Sucursal</label>
        <app-select
          [config]="branchSelectConfig"
          (changeOption)="onBranchChange($event)">
        </app-select>
      </div>
    </form>
  </div>

  <div class="warehouse-modal__footer">
    <app-button
      text="Cancelar"
      custom_class="btn_secondary"
      (clicked)="close()">
    </app-button>
    <app-button
      [text]="isNew ? 'Crear Almacén' : 'Guardar Cambios'"
      custom_class="btn_primary"
      [loading]="saving()"
      [disabled]="form.invalid || saving()"
      (clicked)="save()">
    </app-button>
  </div>
</div>
