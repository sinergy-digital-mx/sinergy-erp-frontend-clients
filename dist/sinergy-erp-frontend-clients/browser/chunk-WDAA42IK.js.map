<div class="branch-modal">
  <div class="branch-modal__header">
    <h2>{{ isNew ? 'Nueva Sucursal' : 'Editar Sucursal' }}</h2>
    <lucide-icon
      [img]="X"
      class="close cursor-pointer"
      (click)="close()">
    </lucide-icon>
  </div>

  <div class="branch-modal__body">
    <form [formGroup]="form">
      <!-- Código -->
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Código *</label>
        <input
          type="text"
          formControlName="code"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Ej: BRANCH-001">
        <p *ngIf="form.get('code')?.invalid && form.get('code')?.touched" class="text-xs text-red-600 mt-1">
          Código requerido (mín. 2 caracteres)
        </p>
      </div>

      <!-- Dirección -->
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Dirección *</label>
        <input
          type="text"
          formControlName="address"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Ej: Av. Principal 123">
        <p *ngIf="form.get('address')?.invalid && form.get('address')?.touched" class="text-xs text-red-600 mt-1">
          Dirección requerida (mín. 5 caracteres)
        </p>
      </div>

      <!-- Ciudad -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad *</label>
        <input
          type="text"
          formControlName="city"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Ej: Monterrey">
        <p *ngIf="form.get('city')?.invalid && form.get('city')?.touched" class="text-xs text-red-600 mt-1">
          Ciudad requerida
        </p>
      </div>

      <!-- Estado -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Estado *</label>
        <input
          type="text"
          formControlName="state"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Ej: Nuevo León">
        <p *ngIf="form.get('state')?.invalid && form.get('state')?.touched" class="text-xs text-red-600 mt-1">
          Estado requerido
        </p>
      </div>

      <!-- País -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">País *</label>
        <input
          type="text"
          formControlName="country"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="México">
        <p *ngIf="form.get('country')?.invalid && form.get('country')?.touched" class="text-xs text-red-600 mt-1">
          País requerido
        </p>
      </div>

      <!-- Código Postal -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Código Postal *</label>
        <input
          type="text"
          formControlName="postal_code"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="64000"
          maxlength="5">
        <p *ngIf="form.get('postal_code')?.invalid && form.get('postal_code')?.touched" class="text-xs text-red-600 mt-1">
          Código postal inválido (5 dígitos)
        </p>
      </div>

      <!-- Status -->
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <app-select
          [config]="statusSelectConfig"
          (changeOption)="onStatusChange($event)">
        </app-select>
      </div>
    </form>
  </div>

  <div class="branch-modal__footer">
    <app-button
      text="Cancelar"
      custom_class="btn_secondary"
      (clicked)="close()">
    </app-button>
    <app-button
      [text]="isNew ? 'Crear Sucursal' : 'Guardar Cambios'"
      custom_class="btn_primary"
      [loading]="saving()"
      [disabled]="form.invalid || saving()"
      (clicked)="save()">
    </app-button>
  </div>
</div>
