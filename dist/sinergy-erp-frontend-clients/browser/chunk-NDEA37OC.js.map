<div class="settings-list-page px-4 pb-6">
  <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-4">
    <div>
      <h2 class="text-2xl font-semibold text-gray-800">Configuraciones Fiscales</h2>
      <p class="text-gray-600 text-sm mt-1">Gestiona la información fiscal de tus almacenes</p>
    </div>

    <app-button
      text="Nueva Configuración"
      custom_class="btn_primary"
      (clicked)="openCreateDialog()">
    </app-button>
  </div>

  <app-datatable-wrapper
    variant="settings"
    [config]="table_config()"
    [rowTemplate]="tableTemplate"
    (pageChange)="onPageChange($event)"
    (rowClick)="openEditDialog($event.data)">
  </app-datatable-wrapper>
</div>

<ng-template #tableTemplate let-item="$implicit">
  <td>
    <p class="settings-cell-primary truncate">{{ item.razon_social }}</p>
  </td>
  <td>
    <span class="settings-cell-mono">{{ item.rfc }}</span>
  </td>
  <td>
    <span class="settings-cell-text">{{ item.persona_type }}</span>
  </td>
  <td>
    <span class="settings-badge" [ngClass]="getStatusClass(item.status)">
      {{ getStatusLabel(item.status) }}
    </span>
  </td>
</ng-template>
