<div class="modal-container">
  <div class="modal-header">
    <div>
      <h2 class="text-xl font-semibold text-gray-800">Agregar abono manual</h2>
      <p class="text-sm text-gray-600 mt-1">Registra un abono de enganche antes de definir cuotas programadas.</p>
    </div>
    <button (click)="close()" class="close-button" type="button">
      <lucide-icon [img]="X" [size]="20"></lucide-icon>
    </button>
  </div>

  <div class="modal-body">
    <form [formGroup]="form" class="space-y-4">
      <app-input
        label="Monto *"
        type="number"
        placeholder="Ej. 200"
        [form_control]="form.get('amount')">
      </app-input>

      <app-input
        label="Fecha de vencimiento *"
        type="date"
        [form_control]="form.get('due_date')">
      </app-input>

      <label class="flex items-center gap-2 text-sm text-gray-700">
        <input type="checkbox" formControlName="record_as_paid" class="rounded border-gray-300" />
        Registrar como pagado ahora
      </label>

      @if (form.get('record_as_paid')?.value) {
        <app-input
          label="Fecha de pago *"
          type="date"
          [form_control]="form.get('payment_date')">
        </app-input>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Método de pago <span class="text-red-500">*</span>
          </label>
          <app-select [config]="paymentMethodSelectConfig"></app-select>
        </div>
      }

      <app-input
        label="Número de referencia"
        type="text"
        placeholder="Opcional"
        [form_control]="form.get('reference_number')">
      </app-input>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Notas</label>
        <textarea
          formControlName="notes"
          rows="3"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Notas opcionales"></textarea>
      </div>
    </form>
  </div>

  <div class="modal-footer">
    <app-button text="Cancelar" custom_class="btn_secondary" (clicked)="close()"></app-button>
    <app-button text="Registrar abono" custom_class="btn_primary" [loading]="saving()" (clicked)="save()"></app-button>
  </div>
</div>
