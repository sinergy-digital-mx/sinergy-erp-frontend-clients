<div class="toast" [class]="'toast--' + type" role="status" (click)="dismiss()">
  <div class="toast__icon-wrap" aria-hidden="true">
    <lucide-icon [img]="iconForType()" class="toast__icon"></lucide-icon>
  </div>

  <div class="toast__content">
    <p class="toast__title">{{ displayTitle }}</p>
    @if (displayMessage) {
      <p class="toast__message">{{ displayMessage }}</p>
    }
  </div>

  <button type="button" class="toast__close" (click)="dismiss(); $event.stopPropagation()" aria-label="Cerrar">
    <lucide-icon [img]="X" class="toast__close-icon"></lucide-icon>
  </button>
</div>
