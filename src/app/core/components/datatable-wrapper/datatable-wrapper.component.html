<div class="datatable-wrapper" [class.datatable-wrapper--settings]="variant === 'settings'">
  <!-- Loading Indicator -->
  <div *ngIf="config?.loading" class="loading-overlay">
    <app-spinner></app-spinner>
  </div>

  <!-- Empty State -->
  <div *ngIf="!config?.loading && (!config?.rows || config?.rows.length === 0)" class="empty-state-container">
    <app-empty-stage
      [message]="config?.emptyState?.title || 'No result found'"
      [sub_message]="config?.emptyState?.subtitle || ''"
      [params]="emptyStateParams"
    ></app-empty-stage>
  </div>

  <!-- Data Table -->
  <div *ngIf="!config?.loading && config?.rows && config?.rows.length > 0" class="datatable-container">
    <table class="datatable-table">
      <thead>
        <tr>
          <th *ngFor="let column of config?.columns; trackBy: trackByIndex" 
              [style.width]="column.width ? column.width + 'px' : 'auto'"
              [ngClass]="getSortIndicatorClass(column)"
              [style.cursor]="column.sortable ? 'pointer' : 'default'"
              (click)="column.sortable && onSortChange({ column: column })">
            <span class="column-header">
              {{ column.name }}
              <span class="sort-indicator" *ngIf="isColumnSorted(column)">
                {{ getSortIndicator(column) }}
              </span>
            </span>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of config?.rows; trackBy: trackByIndex" 
            (click)="onRowClick({ data: row })"
            class="datatable-row">
          <ng-container *ngIf="rowTemplate">
            <ng-container *ngTemplateOutlet="rowTemplate; context: { $implicit: row }"></ng-container>
          </ng-container>
          <ng-container *ngIf="!rowTemplate">
            <td *ngFor="let column of config?.columns; trackBy: trackByIndex">
              {{ row[column.prop] }}
            </td>
          </ng-container>
        </tr>
      </tbody>
    </table>

    <div
      class="pagination-controls"
      *ngIf="config?.externalPaging && (config?.totalResults ?? 0) > 0">
      <span class="pagination-summary">
        {{ rangeStart }}-{{ rangeEnd }} de {{ config?.totalResults }} resultados
      </span>

      <div class="pagination-actions">
        <label class="pagination-per-page" for="datatable-page-size">
          <span class="pagination-per-page__label">Por página</span>
          <select
            id="datatable-page-size"
            class="pagination-per-page__select"
            [value]="config?.limit"
            (change)="onLimitChange($event)">
            <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }}</option>
          </select>
        </label>

        <div class="pagination-nav">
          <button
            type="button"
            class="pagination-nav__btn"
            aria-label="Página anterior"
            [disabled]="(config?.page ?? 1) <= 1"
            (click)="onPrevPage()">
            ‹
          </button>
          <span class="pagination-nav__indicator">{{ config?.page }} / {{ totalPages }}</span>
          <button
            type="button"
            class="pagination-nav__btn"
            aria-label="Página siguiente"
            [disabled]="!config?.hasNext"
            (click)="onNextPage()">
            ›
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
