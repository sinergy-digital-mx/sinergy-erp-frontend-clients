<div class="dialog">
  <div class="dialog__header">
    <h2>{{ isEdit ? 'Editar Formato de Reservación' : 'Nuevo Formato de Reservación' }}</h2>
    <div class="dialog__header-actions">
      @if (showPrefill && !isEdit) {
        <button type="button" class="dialog__prefill-btn" (click)="prefillForTest()" title="Rellenar con datos de prueba">
          <lucide-icon [img]="Wand2" [size]="14"></lucide-icon>
          <span>Prellenar (test)</span>
        </button>
      }
      <lucide-icon [img]="X" class="close cursor-pointer" (click)="close()"></lucide-icon>
    </div>
  </div>

  <div class="dialog__body">
    <form [formGroup]="form" class="form-sections">
      <!-- Encabezado -->
      <section class="form-section">
        <h3 class="form-section__title">Encabezado</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="field-label">Razón social (logo del PDF)</label>
            <app-select [config]="fiscalSelectConfig"></app-select>
          </div>
          <app-input label="A nombre de (payable to)" [form_control]="form.controls['payable_to']"></app-input>
        </div>
      </section>

      <!-- LOTE -->
      <section class="form-section">
        <h3 class="form-section__title">Lote</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="md:col-span-2">
            <label class="field-label">Lote <span class="text-red-500">*</span></label>
            <app-select [config]="propertySelectConfig"></app-select>
          </div>
          <app-input label="Precio de compra" type="number" [form_control]="form.controls['purchase_price']"></app-input>
          <div>
            <label class="field-label">Moneda</label>
            <app-select [config]="currencySelectConfig"></app-select>
          </div>
        </div>
      </section>

      <!-- Recepción de fondos -->
      <section class="form-section">
        <h3 class="form-section__title">Recepción de fondos</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <app-input label="Recibido de" [form_control]="form.controls['received_from']"></app-input>
          <app-input label="Comprobado mediante" [form_control]="form.controls['evidenced_by']"></app-input>
          <div class="md:col-span-2">
            <app-input label="Cantidad con letra" [form_control]="form.controls['amount_in_words']"></app-input>
          </div>
        </div>
      </section>

      <!-- Plan de pagos -->
      <section class="form-section">
        <h3 class="form-section__title">Plan de pagos</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <app-input label="Depósito de reservación" type="number" [form_control]="form.controls['reservation_deposit']"></app-input>
          <app-input label="Fecha de reservación" type="date" [form_control]="form.controls['reservation_date']"></app-input>
          <app-input label="Enganche" type="number" [form_control]="form.controls['down_payment']"></app-input>
          <app-input label="Fecha de enganche" type="date" [form_control]="form.controls['down_payment_date']"></app-input>
          <app-input label="Saldo a financiar" type="number" [form_control]="form.controls['financed_balance']"></app-input>
          <app-input label="Años de financiamiento" type="number" [form_control]="form.controls['financing_years']"></app-input>
          <app-input label="Número de mensualidades" type="number" [form_control]="form.controls['monthly_payments_count']"></app-input>
          <app-input label="Monto de mensualidad" type="number" [form_control]="form.controls['monthly_payment_amount']"></app-input>
          <app-input label="Cuota de mantenimiento" type="number" [form_control]="form.controls['maintenance_fee']"></app-input>
          <div>
            <label class="field-label">Moneda de mantenimiento</label>
            <app-select [config]="maintenanceCurrencySelectConfig"></app-select>
          </div>
          <div>
            <label class="field-label">Día de pago</label>
            <app-select [config]="paymentDaySelectConfig"></app-select>
          </div>
        </div>
      </section>

      <!-- Comprador -->
      <section class="form-section">
        <h3 class="form-section__title">Comprador</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <app-input label="Nombre del comprador" [form_control]="form.controls['buyer_name']"></app-input>
          <app-input label="Teléfono" [form_control]="form.controls['buyer_phone']"></app-input>
          <app-input label="Correo electrónico" [form_control]="form.controls['buyer_email']"></app-input>
          <app-input label="Dirección" [form_control]="form.controls['buyer_address']"></app-input>
        </div>
      </section>

      <!-- Origen -->
      <section class="form-section">
        <h3 class="form-section__title">Origen del prospecto</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="field-label">Origen</label>
            <app-select [config]="leadSourceSelectConfig"></app-select>
          </div>
          @if (form.controls['lead_source'].value === 'otro') {
            <app-input label="Especifica el origen" [form_control]="form.controls['lead_source_other']"></app-input>
          }
        </div>
      </section>

      <!-- Pie -->
      <section class="form-section">
        <h3 class="form-section__title">Datos finales</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <app-input label="Fecha del formato" type="date" [form_control]="form.controls['format_date']"></app-input>
          <app-input label="Nombre del agente" [form_control]="form.controls['agent_name']"></app-input>
          <div class="md:col-span-2">
            <app-input label="Notas" type="textarea" [form_control]="form.controls['notes']"></app-input>
          </div>
        </div>
      </section>
    </form>
  </div>

  <div class="dialog__footer">
    <app-button
      [text]="isEdit ? 'Guardar cambios' : 'Crear formato'"
      [loading]="loading()"
      [fullWidth]="false"
      (clicked)="submit()">
    </app-button>
  </div>
</div>
