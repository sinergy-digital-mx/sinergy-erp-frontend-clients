<div class="goal-form-dialog">
  <div class="goal-form-dialog__header">
    <h2>{{ isNew ? 'Nueva meta' : 'Editar meta' }}</h2>
    <lucide-icon
      [img]="X"
      class="close cursor-pointer"
      (click)="close()">
    </lucide-icon>
  </div>

  <div class="goal-form-dialog__body">
    <div *ngIf="loadingLookups()" class="goal-form-dialog__loading">
      Cargando opciones...
    </div>

    <form *ngIf="!loadingLookups()" [formGroup]="form">
      <div class="col-span-2">
        <label class="field-label">Tipo *</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" formControlName="goal_scope" value="branch" />
            <span>Sucursal</span>
          </label>
          <label class="radio-option">
            <input type="radio" formControlName="goal_scope" value="user_role" />
            <span>Por rol de usuario</span>
          </label>
        </div>
      </div>

      <div class="col-span-2">
        <label class="field-label">Sucursal *</label>
        <app-select [config]="branchSelectConfig"></app-select>
        <p
          *ngIf="form.get('billing_branch_id')?.invalid && form.get('billing_branch_id')?.touched"
          class="field-error">
          Selecciona una sucursal
        </p>
      </div>

      <div class="col-span-2" *ngIf="isUserRoleScope">
        <label class="field-label">Rol *</label>
        <app-select [config]="roleSelectConfig"></app-select>
        <p
          *ngIf="(form.get('role_id')?.invalid || form.hasError('roleRequired')) && form.get('role_id')?.touched"
          class="field-error">
          Selecciona un rol
        </p>
      </div>

      <div class="col-span-2">
        <label class="field-label">Métrica *</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" formControlName="metric_type" value="sales_count" />
            <span>Cantidad de ventas</span>
          </label>
          <label class="radio-option">
            <input type="radio" formControlName="metric_type" value="amount" />
            <span>Monto $</span>
          </label>
        </div>
      </div>

      <div class="col-span-2">
        <label class="field-label">Valor meta *</label>
        <input
          type="number"
          formControlName="target_value"
          min="0"
          step="any"
          class="field-input"
          placeholder="Ej: 100000" />
        <p
          *ngIf="form.get('target_value')?.invalid && form.get('target_value')?.touched"
          class="field-error">
          Ingresa un valor mayor a 0
        </p>
      </div>

      <div>
        <label class="field-label">Año *</label>
        <app-select [config]="yearSelectConfig"></app-select>
      </div>

      <div>
        <label class="field-label">Mes *</label>
        <app-select [config]="monthSelectConfig"></app-select>
      </div>

      <div class="col-span-2" *ngIf="!isNew">
        <label class="field-label">Estado</label>
        <app-select [config]="activeSelectConfig"></app-select>
      </div>

      <div class="col-span-2">
        <label class="field-label">Notas</label>
        <textarea
          formControlName="notes"
          rows="3"
          class="field-input field-input--textarea"
          placeholder="Opcional"></textarea>
      </div>
    </form>
  </div>

  <div class="goal-form-dialog__footer">
    <app-button
      text="Cancelar"
      custom_class="btn_secondary"
      (clicked)="close()">
    </app-button>
    <app-button
      [text]="isNew ? 'Crear meta' : 'Guardar cambios'"
      custom_class="btn_primary"
      [loading]="saving()"
      [disabled]="form.invalid || saving() || loadingLookups()"
      (clicked)="save()">
    </app-button>
  </div>
</div>
