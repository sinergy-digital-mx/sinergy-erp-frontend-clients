<div class="inventory-list">
  <div class="header">
    <h1>Inventario</h1>
    <button class="btn-create" (click)="openAdjustmentDialog()">
      Ajuste de Inventario
    </button>
  </div>

  <!-- Summary Cards -->
  <div class="summary-cards">
    <div class="summary-card">
      <div class="card-icon" style="background: rgba(102, 126, 234, 0.1);">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
      </div>
      <div class="card-content">
        <div class="card-label">Total Artículos</div>
        <div class="card-value">{{ formatNumber(totalItems()) }}</div>
      </div>
    </div>

    <div class="summary-card">
      <div class="card-icon" style="background: rgba(16, 185, 129, 0.1);">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"></line>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
      </div>
      <div class="card-content">
        <div class="card-label">Valor Total</div>
        <div class="card-value">{{ formatCurrency(totalValue()) }}</div>
      </div>
    </div>

    <div class="summary-card">
      <div class="card-icon" style="background: rgba(245, 158, 11, 0.1);">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
      </div>
      <div class="card-content">
        <div class="card-label">Stock Bajo</div>
        <div class="card-value">{{ lowStockCount() }}</div>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <app-inventory-filter-bar 
    [warehouses]="warehouses()"
    (filtersChange)="applyFilters($event)">
  </app-inventory-filter-bar>

  <!-- Inventory Table -->
  <app-inventory-table
    [items]="filteredItems()"
    [loading]="loading()"
    (itemClick)="navigateToDetail($event)"
    (loadMore)="loadMore()">
  </app-inventory-table>
</div>
