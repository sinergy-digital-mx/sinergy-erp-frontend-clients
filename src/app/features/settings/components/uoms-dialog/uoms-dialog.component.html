<div class="dialog">
  <div class="dialog__header">
    <h2>Gestionar Unidades de Medida</h2>
    <button (click)="close()" class="close">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>

  <div class="dialog__body">
    <!-- Create Button -->
    <div *ngIf="!isCreating()" class="header-actions">
      <button (click)="startCreating()" class="create-btn">
        + Crear Nueva
      </button>
    </div>

    <!-- Create Form -->
    <form *ngIf="isCreating()" [formGroup]="form" class="create-form">
      <div>
        <label class="form-label">Nombre</label>
        <input type="text" formControlName="name" class="form-input" placeholder="ej: Pieza, Caja, Pallet" />
      </div>
      <div>
        <label class="form-label">Descripción</label>
        <textarea formControlName="description" class="form-input" rows="2" placeholder="Descripción opcional"></textarea>
      </div>
      <div class="form-actions">
        <button (click)="cancelCreating()" type="button" class="btn btn--secondary">
          Cancelar
        </button>
        <button (click)="saveUOM()" [disabled]="form.invalid || saving()" class="btn btn--primary">
          {{ saving() ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>

    <!-- UOMs List -->
    <div *ngIf="!isCreating()" class="uoms-list">
      <div *ngIf="uoms().length === 0" class="empty-state">
        <p>No hay unidades de medida en el catálogo</p>
      </div>

      <div *ngFor="let uom of uoms()" class="uom-card">
        <!-- View Mode -->
        <div *ngIf="editingUomId() !== uom.id" class="uom-view">
          <div class="uom-info">
            <p class="uom-name">{{ uom.name }}</p>
            <p class="uom-description">{{ uom.description }}</p>
            <p class="uom-date">{{ uom.created_at | date: 'MMMM d' }}</p>
          </div>
          <div class="uom-actions">
            <button (click)="startEditing(uom)" class="icon-btn" title="Editar">
              <i class="fi fi-rr-pencil"></i>
            </button>
            <button (click)="deleteUOM(uom)" [disabled]="saving()" class="icon-btn icon-btn--danger" title="Eliminar">
              <i class="fi fi-rr-trash"></i>
            </button>
          </div>
        </div>

        <!-- Edit Mode -->
        <div *ngIf="editingUomId() === uom.id" class="uom-edit">
          <div>
            <label class="form-label">Nombre</label>
            <input type="text" [(ngModel)]="editingUomForm[uom.id].name" class="form-input form-input--sm" />
          </div>
          <div>
            <label class="form-label">Descripción</label>
            <textarea [(ngModel)]="editingUomForm[uom.id].description" class="form-input form-input--sm" rows="2"></textarea>
          </div>
          <div class="form-actions">
            <button (click)="cancelEditing()" type="button" class="btn btn--sm btn--secondary">
              Cancelar
            </button>
            <button (click)="saveEdit(uom)" [disabled]="saving()" class="btn btn--sm btn--primary">
              {{ saving() ? 'Guardando...' : 'Guardar' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="dialog__footer">
    <button (click)="close()" class="btn btn--secondary">
      Cerrar
    </button>
  </div>
</div>
