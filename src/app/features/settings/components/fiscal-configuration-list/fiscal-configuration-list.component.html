<div class="px-4">
  <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-4">
    <div>
      <h2 class="text-2xl font-semibold text-gray-800">Configuraciones Fiscales</h2>
      <p class="text-gray-600 text-sm mt-1">Gestiona la información fiscal de tus almacenes</p>
    </div>

    <app-button
      text="Nueva Configuración"
      custom_class="btn_primary"
      (clicked)="openCreateDialog()">
    </app-button>
  </div>

  <app-datatable-wrapper
    [config]="table_config()"
    [rowTemplate]="tableTemplate"
    (pageChange)="onPageChange($event)">
  </app-datatable-wrapper>
</div>

<ng-template #tableTemplate let-item="$implicit">
  <td>{{ item.razon_social }}</td>
  <td class="font-mono">{{ item.rfc }}</td>
  <td>{{ item.persona_type }}</td>
  <td>
    <span [class]="'inline-flex items-center px-2 py-1 rounded-full text-xs font-medium ' + getStatusClass(item.status)">
      {{ getStatusLabel(item.status) }}
    </span>
  </td>
  <td (click)="$event.stopPropagation()">
    <div class="flex gap-2">
      <button
        (click)="openEditDialog(item)"
        class="p-2 text-blue-600 hover:bg-blue-50 rounded-md transition-colors"
        title="Editar">
        <lucide-icon [img]="Edit2" class="w-4 h-4"></lucide-icon>
      </button>
      <button
        (click)="deleteConfig(item, $event)"
        class="p-2 text-red-600 hover:bg-red-50 rounded-md transition-colors"
        title="Eliminar">
        <lucide-icon [img]="Trash2" class="w-4 h-4"></lucide-icon>
      </button>
    </div>
  </td>
</ng-template>
