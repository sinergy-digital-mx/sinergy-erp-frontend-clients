<div class="px-4">
  <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-4">
    <h2 class="text-2xl font-semibold text-gray-800">Almacenes</h2>

    <div class="flex items-center gap-3">
      <app-search
        class="w-64"
        [param_activate]="false"
        (searchChange)="onSearchChange($event)">
      </app-search>

      <app-button
        text="Nuevo Almacén"
        custom_class="btn_primary"
        (clicked)="openCreateWarehouseModal()">
      </app-button>
    </div>
  </div>

  <app-datatable-wrapper
    [config]="table_config()"
    [rowTemplate]="tableTemplate"
    (rowClick)="viewDetail($event)">
  </app-datatable-wrapper>
</div>

<ng-template #tableTemplate let-item="$implicit">
  <td>
    <span class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-800 whitespace-nowrap">
      {{ item.name }}
    </span>
  </td>
  <td>{{ item.code }}</td>
  <td>{{ item.country }}</td>
  <td>{{ item.state }}</td>
  <td>
    <span [class]="'inline-flex items-center px-2 py-1 rounded-full text-xs font-medium ' + getStatusClass(item.status)">
      {{ getStatusLabel(item.status) }}
    </span>
  </td>
  <td (click)="$event.stopPropagation()">
    <app-button
      text="Detalle"
      size="sm"
      [fullWidth]="false"
      custom_class="btn_primary"
      (clicked)="viewDetail(item)"
      [icon]="ArrowRight">
    </app-button>
  </td>
  <td (click)="$event.stopPropagation()">
    <button
      (click)="deleteWarehouse(item, $event)"
      class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors"
      title="Eliminar almacén">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
      </svg>
    </button>
  </td>
</ng-template>
