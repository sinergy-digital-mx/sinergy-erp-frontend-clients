<div class="px-2 py-2">
  <div class="flex items-start justify-between mb-3">
    <h2 class="text-2xl font-semibold text-gray-800">Productos</h2>
    
    <div class="flex flex-col items-end gap-3">
      <app-search
        class="w-64"
        [param_activate]="false"
        (searchChange)="onSearchChange($event)">
      </app-search>

      <div class="flex items-center gap-3">
        <app-button
          text="Categorías"
          size="sm"
          custom_class="btn_secondary"
          (clicked)="openCategoriesDialog()">
        </app-button>

        <app-button
          text="Unidades"
          size="sm"
          custom_class="btn_secondary"
          (clicked)="openUOMsDialog()">
        </app-button>

        <app-button
          text="Listas de Precios"
          size="sm"
          custom_class="btn_secondary"
          (clicked)="openPriceListsDialog()">
        </app-button>

        <app-button
          text="Nuevo Producto"
          size="sm"
          custom_class="btn_primary"
          (clicked)="openCreateProductModal()">
        </app-button>
      </div>
    </div>
  </div>

  <app-datatable-wrapper
    [config]="table_config()"
    [rowTemplate]="tableTemplate"
    (sortChange)="onSortChange($event)"
    (rowClick)="viewDetail($event)">
  </app-datatable-wrapper>
</div>

<ng-template #tableTemplate let-item="$implicit">
  <td>
    <span class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-800 whitespace-nowrap">
      {{ item.sku }}
    </span>
  </td>
  <td>{{ item.name }}</td>
  <td>
    <span class="text-gray-700 text-sm">{{ item.category?.name || '—' }}</span>
  </td>
  <td>
    <span class="text-gray-700 text-sm">{{ item.subcategory?.name || '—' }}</span>
  </td>
</ng-template>
