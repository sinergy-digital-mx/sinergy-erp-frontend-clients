<div class="px-2">
  <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-4">
    <div>
      <h2 class="text-2xl font-semibold text-gray-800">Productos</h2>
    </div>

    <div class="flex items-center gap-3">
      <app-search
        class="w-64"
        [param_activate]="false"
        (searchChange)="onSearchChange($event)">
      </app-search>

      <app-button
        text="Categorías"
        custom_class="btn_secondary"
        (clicked)="openCategoriesDialog()">
      </app-button>

      <app-button
        text="Unidades"
        custom_class="btn_secondary"
        (clicked)="openUOMsDialog()">
      </app-button>

      <app-button
        text="Nuevo Producto"
        custom_class="btn_primary"
        (clicked)="openCreateProductModal()">
      </app-button>
    </div>
  </div>

  <app-datatable-wrapper
    [config]="table_config()"
    [rowTemplate]="tableTemplate"
    (sortChange)="onSortChange($event)"
    (rowClick)="viewDetail($event)">
  </app-datatable-wrapper>
</div>

<ng-template #tableTemplate let-item="$implicit">
  <td>
    <span class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-800 whitespace-nowrap">
      {{ item.sku }}
    </span>
  </td>
  <td>{{ item.name }}</td>
  <td>
    <span class="text-gray-700 text-sm">{{ item.category?.name || '—' }}</span>
  </td>
  <td>
    <span class="text-gray-700 text-sm">{{ item.subcategory?.name || '—' }}</span>
  </td>
  <td class="text-center">
    <span class="text-gray-600">{{ getBaseUoMDisplay(item) }}</span>
  </td>
  <td (click)="$event.stopPropagation()">
    <div class="flex gap-2">
      <app-button
        text="Duplicar"
        size="sm"
        [fullWidth]="false"
        custom_class="btn_secondary"
        (clicked)="duplicateProduct(item)">
      </app-button>
      <app-button
        text="Detalle"
        size="sm"
        [fullWidth]="false"
        custom_class="btn_primary"
        (clicked)="viewDetail(item)"
        [icon]="ArrowRight">
      </app-button>
    </div>
  </td>
</ng-template>
