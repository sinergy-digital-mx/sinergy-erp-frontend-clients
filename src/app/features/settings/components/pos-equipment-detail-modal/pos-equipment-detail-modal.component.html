<div class="p-6">
  <h2 class="text-2xl font-bold text-gray-900 mb-6">
    {{ isEditMode ? 'Editar Equipo' : 'Nuevo Equipo' }}
  </h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
    <!-- Nombre del Equipo -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Nombre del Equipo
        <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        formControlName="name"
        placeholder="Ej: Computadora 1-TJ-EJ"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
      />
      <p *ngIf="form.get('name')?.hasError('required') && form.get('name')?.touched" class="text-red-500 text-sm mt-1">
        El nombre es requerido
      </p>
      <p *ngIf="form.get('name')?.hasError('minlength') && form.get('name')?.touched" class="text-red-500 text-sm mt-1">
        El nombre debe tener al menos 3 caracteres
      </p>
    </div>

    <!-- Sucursal -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Sucursal
        <span class="text-red-500">*</span>
      </label>
      <app-select
        formControlName="warehouse_id"
        [config]="warehouseSelectConfig">
      </app-select>
      <p *ngIf="form.get('warehouse_id')?.hasError('required') && form.get('warehouse_id')?.touched" class="text-red-500 text-sm mt-1">
        La sucursal es requerida
      </p>
    </div>

    <!-- Status -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Estado
        <span class="text-red-500">*</span>
      </label>
      <app-select
        formControlName="status"
        [config]="statusSelectConfig">
      </app-select>
    </div>

    <!-- Botones -->
    <div class="flex gap-3 justify-end pt-6 border-t border-gray-200">
      <app-button
        text="Cancelar"
        custom_class="btn_secondary"
        (clicked)="onCancel()">
      </app-button>
      <app-button
        [text]="isEditMode ? 'Actualizar' : 'Crear'"
        custom_class="btn_primary"
        [disabled]="form.invalid || isLoading"
        (clicked)="onSubmit()">
      </app-button>
    </div>
  </form>
</div>
