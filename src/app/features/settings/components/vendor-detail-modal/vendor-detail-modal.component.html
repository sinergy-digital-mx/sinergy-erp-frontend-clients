<div class="vendor-modal">
  <div class="vendor-modal__header">
    <h2>{{ isNew ? 'Nuevo Proveedor' : 'Editar Proveedor' }}</h2>
    <lucide-icon
      [img]="X"
      class="close cursor-pointer"
      (click)="close()">
    </lucide-icon>
  </div>

  <div class="vendor-modal__body">
    <form [formGroup]="form">
      <!-- Nombre y Empresa -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
        <input
          type="text"
          formControlName="name"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Nombre del proveedor">
        <p *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="text-xs text-red-600 mt-1">
          Nombre requerido (mín. 2 caracteres)
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Empresa</label>
        <input
          type="text"
          formControlName="company_name"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Nombre de la empresa">
      </div>

      <!-- RFC y Razón Social -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">RFC</label>
        <input
          type="text"
          formControlName="rfc"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 uppercase"
          placeholder="Ej: ACM123456ABC">
        <p *ngIf="form.get('rfc')?.invalid && form.get('rfc')?.touched" class="text-xs text-red-600 mt-1">
          RFC inválido (formato: 3-4 letras + 6 dígitos + 3 alfanuméricos)
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Razón Social</label>
        <input
          type="text"
          formControlName="razon_social"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Razón social">
      </div>

      <!-- Tipo de Persona y Status -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Persona</label>
        <select
          formControlName="persona_type"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 bg-white">
          <option *ngFor="let opt of personaTypeOptions" [value]="opt.id">{{ opt.name }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select
          formControlName="status"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 bg-white">
          <option *ngFor="let opt of statusOptions" [value]="opt.id">{{ opt.name }}</option>
        </select>
      </div>

      <!-- Dirección -->
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Calle</label>
        <input
          type="text"
          formControlName="street"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Calle y número">
      </div>

      <!-- Ciudad y Estado -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
        <input
          type="text"
          formControlName="city"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Ciudad">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
        <input
          type="text"
          formControlName="state"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Estado">
      </div>

      <!-- País y CP -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">País</label>
        <select
          formControlName="country"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 bg-white">
          <option value="">Selecciona un país</option>
          <option *ngFor="let opt of countryOptions" [value]="opt.id">{{ opt.name }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">CP</label>
        <input
          type="text"
          formControlName="zip_code"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
          placeholder="Código postal">
      </div>
    </form>
  </div>

  <div class="vendor-modal__footer">
    <app-button
      text="Cancelar"
      custom_class="btn_secondary"
      (clicked)="close()">
    </app-button>
    <app-button
      [text]="isNew ? 'Crear Proveedor' : 'Guardar Cambios'"
      custom_class="btn_primary"
      [loading]="saving()"
      [disabled]="form.invalid || saving()"
      (clicked)="save()">
    </app-button>
  </div>
</div>
