<div class="vendor-modal">
  <div class="vendor-modal__header">
    <h2>{{ isNew ? 'Nuevo Proveedor' : 'Editar Proveedor' }}</h2>
    <lucide-icon [img]="X" class="close cursor-pointer" (click)="close()"></lucide-icon>
  </div>

  <div class="vendor-modal__body">
    <form [formGroup]="form">
      <div class="col-span-2">
        <app-tab
          [tabs]="tabs"
          [activeTabId]="activeTab()"
          (tabChange)="setActiveTab($event)">
        </app-tab>
      </div>

      <ng-container *ngIf="activeTab() === 'general'">
        <!-- Tipo de proveedor -->
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de proveedor *</label>
          <select
            formControlName="vendor_type"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 bg-white">
            <option *ngFor="let opt of vendorTypeOptions" [value]="opt.id">{{ opt.name }}</option>
          </select>
        </div>

        <!-- Datos generales -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
          <input type="text" formControlName="name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Nombre del proveedor">
          <p *ngIf="showError('name')" class="text-xs text-red-600 mt-1">{{ getError('name') }}</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Empresa</label>
          <input type="text" formControlName="company_name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Nombre de la empresa">
        </div>

        <!-- Fiscal Nacional -->
        <ng-container *ngIf="isNational">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">RFC (opcional)</label>
            <input type="text" formControlName="rfc" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 uppercase" placeholder="Ej: ACM123456ABC">
            <p *ngIf="showError('rfc')" class="text-xs text-red-600 mt-1">{{ getError('rfc') }}</p>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Razón Social</label>
            <input type="text" formControlName="razon_social" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Razón social">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Persona *</label>
            <select formControlName="persona_type" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 bg-white">
              <option *ngFor="let opt of personaTypeOptions" [value]="opt.id">{{ opt.name }}</option>
            </select>
          </div>
        </ng-container>

        <!-- Fiscal Internacional -->
        <ng-container *ngIf="!isNational">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ID fiscal / Tax ID *</label>
            <input type="text" formControlName="tax_id" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="VAT, EIN, etc.">
            <p *ngIf="showError('tax_id')" class="text-xs text-red-600 mt-1">{{ getError('tax_id') }}</p>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre legal *</label>
            <input type="text" formControlName="legal_name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Legal name">
            <p *ngIf="showError('legal_name')" class="text-xs text-red-600 mt-1">{{ getError('legal_name') }}</p>
          </div>
        </ng-container>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
          <select formControlName="status" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 bg-white">
            <option *ngFor="let opt of statusOptions" [value]="opt.id">{{ opt.name }}</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Días de Crédito</label>
          <input type="number" formControlName="credit_days" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Límite de Crédito</label>
          <input type="number" formControlName="credit_limit" min="0" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
        </div>
      </ng-container>

      <ng-container *ngIf="activeTab() === 'direccion'">
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Calle</label>
          <input type="text" formControlName="street" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Calle y número">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
          <input type="text" formControlName="city" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Ciudad">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ isNational ? 'Estado' : 'Estado / Provincia' }}</label>
          <input type="text" formControlName="state" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Estado">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">País {{ isNational ? '' : '*' }}</label>
          <select *ngIf="!isNational" formControlName="country" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 bg-white">
            <option value="">Selecciona un país</option>
            <option *ngFor="let opt of countryOptions" [value]="opt.id">{{ opt.name }}</option>
          </select>
          <input *ngIf="isNational" type="text" formControlName="country" readonly class="w-full px-3 py-2 border border-gray-200 rounded-md bg-gray-50 text-gray-700">
          <p *ngIf="showError('country')" class="text-xs text-red-600 mt-1">{{ getError('country') }}</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">CP / Código postal</label>
          <input type="text" formControlName="zip_code" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Código postal">
        </div>
      </ng-container>

      <ng-container *ngIf="activeTab() === 'bancaria'">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Banco</label>
          <input type="text" formControlName="bank_name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Nombre del banco">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Titular de la cuenta</label>
          <input type="text" formControlName="bank_account_holder" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Titular">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Número de cuenta</label>
          <input type="text" formControlName="bank_account_number" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Número de cuenta">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Moneda</label>
          <select formControlName="bank_currency" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 bg-white">
            <option *ngFor="let opt of currencyOptions" [value]="opt.id">{{ opt.name }}</option>
          </select>
        </div>

        <div *ngIf="isNational">
          <label class="block text-sm font-medium text-gray-700 mb-1">CLABE (18 dígitos)</label>
          <input type="text" formControlName="bank_clabe" maxlength="18" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="000000000000000000">
          <p *ngIf="showError('bank_clabe')" class="text-xs text-red-600 mt-1">{{ getError('bank_clabe') }}</p>
        </div>

        <ng-container *ngIf="!isNational">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">SWIFT / BIC</label>
            <input type="text" formControlName="bank_swift_bic" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 uppercase" placeholder="SWIFT">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">IBAN</label>
            <input type="text" formControlName="bank_iban" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 uppercase" placeholder="IBAN">
          </div>
        </ng-container>
      </ng-container>
    </form>
  </div>

  <div class="vendor-modal__footer">
    <app-button text="Cancelar" custom_class="btn_secondary" (clicked)="close()"></app-button>
    <app-button
      [text]="isNew ? 'Crear Proveedor' : 'Guardar Cambios'"
      custom_class="btn_primary"
      [loading]="saving()"
      [disabled]="form.invalid || saving()"
      (clicked)="save()">
    </app-button>
  </div>
</div>
