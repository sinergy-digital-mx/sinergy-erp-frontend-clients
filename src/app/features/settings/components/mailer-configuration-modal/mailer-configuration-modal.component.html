<div class="modal-container">
  <div class="modal-header">
    <h2>{{ isEdit ? 'Editar Configuración de Correo' : 'Crear Configuración de Correo' }}</h2>
    <button (click)="close()" class="close-button" type="button">
      <span class="text-2xl">&times;</span>
    </button>
  </div>

  <div class="modal-body">
    <form [formGroup]="form" class="space-y-4">
      <div class="bg-blue-50 p-3 rounded border border-blue-200">
        <p class="text-xs text-blue-700">
          Por ahora el proveedor soportado es <strong>Resend</strong>. El API key se guarda de forma segura.
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
        <input
          type="text"
          formControlName="name"
          placeholder="Ej: Resend Producción"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
          [class.border-red-500]="form.get('name')?.invalid && form.get('name')?.touched">
        <p *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="text-xs text-red-500 mt-1">
          El nombre es requerido (mínimo 3 caracteres)
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Proveedor</label>
        <input
          type="text"
          value="resend"
          disabled
          class="w-full px-3 py-2 border border-gray-200 rounded-md bg-gray-100 text-gray-600">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Resend API Key</label>
        <input
          type="password"
          formControlName="apiKey"
          placeholder="{{ isEdit ? 'Dejar vacío para conservar el token actual' : 're_xxxxxxxxxxxxxxxxx' }}"
          autocomplete="new-password"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
          [class.border-red-500]="form.get('apiKey')?.invalid && form.get('apiKey')?.touched">
        <p *ngIf="form.get('apiKey')?.invalid && form.get('apiKey')?.touched" class="text-xs text-red-500 mt-1">
          El API key es requerido
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Correo Remitente</label>
        <input
          type="email"
          formControlName="fromEmail"
          placeholder="noreply@tu-dominio.com"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
          [class.border-red-500]="form.get('fromEmail')?.invalid && form.get('fromEmail')?.touched">
        <p *ngIf="form.get('fromEmail')?.invalid && form.get('fromEmail')?.touched" class="text-xs text-red-500 mt-1">
          Ingresa un correo remitente válido
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Remitente (Opcional)</label>
        <input
          type="text"
          formControlName="fromName"
          placeholder="Synergy ERP"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Responder A (Opcional)</label>
        <input
          type="email"
          formControlName="replyTo"
          placeholder="soporte@tu-dominio.com"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
          [class.border-red-500]="form.get('replyTo')?.invalid && form.get('replyTo')?.touched">
        <p *ngIf="form.get('replyTo')?.invalid && form.get('replyTo')?.touched" class="text-xs text-red-500 mt-1">
          Ingresa un correo válido
        </p>
      </div>

      <div class="flex items-center">
        <input
          type="checkbox"
          formControlName="isActive"
          id="isActive"
          class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
        <label for="isActive" class="ml-2 block text-sm text-gray-700">
          Mantener activa
        </label>
      </div>
    </form>
  </div>

  <div class="modal-footer">
    <button
      (click)="close()"
      type="button"
      class="px-4 py-2 text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-md transition-colors">
      Cancelar
    </button>
    <button
      (click)="submit()"
      [disabled]="loading || form.invalid"
      type="button"
      class="px-4 py-2 bg-indigo-600 text-white hover:bg-indigo-700 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
      {{ loading ? 'Guardando...' : (isEdit ? 'Actualizar' : 'Crear') }}
    </button>
  </div>
</div>
