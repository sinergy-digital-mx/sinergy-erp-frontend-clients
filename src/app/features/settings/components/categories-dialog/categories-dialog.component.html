<div class="dialog">
  <div class="dialog__header">
    <h2>Gestionar Categorías</h2>
    <button (click)="close()" class="close">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>

  <div class="tabs">
    <button 
      class="tab"
      [class.active]="activeTab() === 'categories'"
      (click)="activeTab.set('categories')">
      Categorías
    </button>
    <button 
      class="tab"
      [class.active]="activeTab() === 'subcategories'"
      (click)="activeTab.set('subcategories')"
      [disabled]="!selectedCategoryId()">
      Subcategorías
    </button>
  </div>

  <div class="dialog__body">
    <!-- Categories Tab -->
    <div class="tab-content" [class.active]="activeTab() === 'categories'">
      <!-- Create Button -->
      <div *ngIf="!isCreating()" class="mb-4">
        <button (click)="startCreating()" class="w-full px-3 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700 text-sm font-medium">
          Crear Nueva
        </button>
      </div>

      <!-- Create Form -->
      <form *ngIf="isCreating()" [formGroup]="form" class="mb-4 p-3 border border-purple-200 rounded-md bg-purple-50">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
          <input type="text" formControlName="name" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm" />
        </div>
        <div class="mt-3">
          <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
          <textarea formControlName="description" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm" rows="2"></textarea>
        </div>
        <div class="flex gap-2 mt-3">
          <button (click)="cancelCreating()" type="button" class="flex-1 px-3 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300 text-sm font-medium">
            Cancelar
          </button>
          <button (click)="saveCategory()" [disabled]="form.invalid || saving()" class="flex-1 px-3 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700 disabled:bg-gray-400 text-sm font-medium">
            {{ saving() ? 'Guardando...' : 'Guardar' }}
          </button>
        </div>
      </form>

      <!-- Categories List -->
      <div *ngIf="!isCreating()" class="space-y-2">
        <div *ngFor="let cat of categories()" (click)="selectCategory(cat.id)" class="p-3 border border-gray-200 rounded-md cursor-pointer hover:bg-gray-50">
          <p class="font-medium text-gray-900">{{ cat.name }}</p>
          <p class="text-xs text-gray-600">{{ cat.description }}</p>
        </div>
      </div>
    </div>

    <!-- Subcategories Tab -->
    <div class="tab-content" [class.active]="activeTab() === 'subcategories'">
      <!-- Create Button -->
      <div *ngIf="!isCreatingSubcategory()" class="mb-4">
        <button (click)="startCreatingSubcategory()" class="w-full px-3 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700 text-sm font-medium">
          Crear Nueva
        </button>
      </div>

      <!-- Create Form -->
      <form *ngIf="isCreatingSubcategory()" [formGroup]="form" class="mb-4 p-3 border border-purple-200 rounded-md bg-purple-50">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
          <input type="text" formControlName="name" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm" />
        </div>
        <div class="mt-3">
          <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
          <textarea formControlName="description" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm" rows="2"></textarea>
        </div>
        <div class="flex gap-2 mt-3">
          <button (click)="cancelCreatingSubcategory()" type="button" class="flex-1 px-3 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300 text-sm font-medium">
            Cancelar
          </button>
          <button (click)="saveSubcategory()" [disabled]="form.invalid || saving()" class="flex-1 px-3 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700 disabled:bg-gray-400 text-sm font-medium">
            {{ saving() ? 'Guardando...' : 'Guardar' }}
          </button>
        </div>
      </form>

      <!-- Subcategories List -->
      <div *ngIf="!isCreatingSubcategory()">
        <div *ngIf="subcategories().length === 0" class="text-center py-8 text-gray-500">
          <p>No hay subcategorías</p>
        </div>
        <div *ngIf="subcategories().length > 0" class="space-y-2">
          <div *ngFor="let subcat of subcategories()" class="p-3 border border-gray-200 rounded-md">
            <p class="font-medium text-gray-900">{{ subcat.name }}</p>
            <p class="text-xs text-gray-600">{{ subcat.description }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="dialog__footer">
    <button (click)="close()" class="px-3 py-2 text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 text-sm font-medium">
      Cerrar
    </button>
  </div>
</div>
