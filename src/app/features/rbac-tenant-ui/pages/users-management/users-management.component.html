<!-- Users Management Container with Two-Column Layout -->
<div class="h-screen flex flex-col overflow-hidden">
  <!-- Header with Back Button -->
  <div class="flex items-center gap-3 justify-between flex-shrink-0 px-3 py-3 border-b border-gray-200">
    <div class="flex items-center gap-3">
      <app-back-button (clicked)="goBackToSettings()"></app-back-button>
      <h1 class="text-2xl font-bold text-gray-900">GestiĂłn de Usuarios</h1>
    </div>
    <app-button
      text="+ Crear Usuario"
      variant="primary"
      size="sm"
      [fullWidth]="false"
      (clicked)="openCreateUserDialog()">
    </app-button>
  </div>

  <!-- Main Content -->
  <div class="flex gap-2 flex-1 min-h-0 px-2 py-2">
    <!-- Left Panel: User List -->
    <div class="w-1/3 bg-white border border-gray-200 rounded-lg flex flex-col h-full shadow-sm">
      <!-- Header -->
      <div class="px-3 py-2 border-b border-gray-200 flex-shrink-0">
        <h2 class="text-base font-semibold text-gray-900">Usuarios</h2>
      </div>

      <!-- Search and Filter Section -->
      <div class="px-3 py-2 border-b border-gray-200 space-y-2 flex-shrink-0">
        <!-- Search Input and Status Filter -->
        <app-user-search-filter></app-user-search-filter>
      </div>

      <!-- User List -->
      <div class="flex-1 overflow-y-auto min-h-0">
        @if (filteredUsers$ | async; as users) {
          @if (users.length === 0) {
            <div class="p-3 text-center text-gray-500 text-sm">
              <p>No se encontraron usuarios</p>
            </div>
          } @else {
            @for (user of users; track user.id) {
              <div class="border-b border-gray-100 last:border-b-0">
                <button
                  (click)="onUserSelected(user.id)"
                  [class.bg-blue-50]="(selectedUserId$ | async) === user.id"
                  class="w-full text-left px-3 py-2 hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500"
                >
                  <div class="flex items-center justify-between">
                    <div class="flex-1 min-w-0">
                      <p class="text-sm font-medium text-gray-900 truncate">
                        {{ user.first_name || 'N/A' }} {{ user.last_name || 'N/A' }}
                      </p>
                      <p class="text-xs text-gray-600 mt-1 truncate">{{ user.email }}</p>
                      <p class="text-xs text-gray-500 mt-1">
                        <span [class]="getStatusClass(user.status)">
                          {{ getNormalizedStatus(user.status) | titlecase }}
                        </span>
                      </p>
                    </div>
                  </div>
                </button>
              </div>
            }
          }
        }
      </div>
    </div>

    <!-- Right Panel: User Details -->
    <div class="flex-1 bg-gray-50 border border-gray-200 flex flex-col h-full">
      @if (selectedUser$ | async; as user) {
        <div class="flex flex-col bg-white h-full">
          <app-user-details
            [user]="user"
            [userRoles$]="selectedUserRoles$"
            [availableRoles$]="roles$"
            [isLoadingRoles$]="isLoadingRoles$"
            (roleAssigned)="onRoleAssigned($event)"
            (roleReplaced)="onRoleReplaced($event)"
            (roleDeleted)="onRoleDeleted($event)"
            (userUpdated)="onUserUpdated()"
          ></app-user-details>
        </div>
      } @else {
        <div class="flex items-center justify-center bg-white h-full">
          <div class="text-center">
            <p class="text-gray-500 text-lg">Selecciona un usuario para ver los detalles</p>
          </div>
        </div>
      }
    </div>
  </div>
</div>
