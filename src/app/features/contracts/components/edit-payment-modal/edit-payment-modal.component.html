<div class="dialog-container">
  <div class="dialog-header">
    <h2 class="dialog-title">Editar Pago #{{ data.payment.payment_number }}</h2>
    <button (click)="close()" class="close-button">
      <lucide-icon [img]="X" [size]="20"></lucide-icon>
    </button>
  </div>

  <div class="dialog-content" [formGroup]="form">
    <div class="mb-3 p-2 bg-blue-50 rounded-lg border border-blue-200">
      <p class="text-sm text-blue-900">
        <span class="font-semibold">Estado:</span> {{ data.payment.status }}
      </p>
      <p class="text-sm text-blue-900">
        <span class="font-semibold">Vencimiento Original:</span> {{ data.payment.due_date | localDate:'mediumDate' }}
      </p>
    </div>

    <div class="space-y-4">
      <app-input
        label="Monto Pagado"
        type="number"
        [form_control]="form.controls['amount_paid']">
      </app-input>

      <app-input
        label="Fecha de Vencimiento"
        type="date"
        [form_control]="form.controls['due_date']">
      </app-input>

      <!-- Payment Date -->
      <app-input
        [label]="'Fecha de Pago' + (data.payment.status === 'pagado' ? ' *' : '')"
        type="date"
        [form_control]="form.controls['paid_date']">
      </app-input>

      <!-- Payment Method -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Método de Pago {{ data.payment.status === 'pagado' ? '*' : '' }}
        </label>
        <app-select [config]="paymentMethodSelectConfig"></app-select>
      </div>

      <!-- Reference Number -->
      <app-input
        label="Número de Referencia"
        type="text"
        placeholder="Ej: REF123456"
        [form_control]="form.controls['reference_number']">
      </app-input>

      <!-- Notes -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Notas</label>
        <textarea
          formControlName="notes"
          rows="3"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Notas adicionales sobre el pago..."></textarea>
      </div>
    </div>
  </div>

  <div class="dialog-footer">
    <app-button
      text="Cancelar"
      custom_class="btn_secondary"
      (clicked)="close()">
    </app-button>
    <app-button
      text="Guardar Cambios"
      custom_class="btn_primary"
      [loading]="saving()"
      (clicked)="save()">
    </app-button>
  </div>
</div>
