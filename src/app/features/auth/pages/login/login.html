<div class="min-h-screen flex items-center justify-center px-4 login-bg">
    <div class="w-full max-w-md">
  
      <!-- Card -->
      <div class="bg-white rounded-xl shadow-lg p-8 login-fade-card">
  
        <!-- Logo -->
        <div class="flex justify-center mb-6">
          <app-pollux-brand-text theme="light" size="lg" />
        </div>
  
        <!-- Título -->
        <h1 class="text-2xl font-semibold text-center text-gray-800">
          Bienvenido
        </h1>
        <p class="text-sm text-center text-gray-500 mt-1 mb-6">
          Ingresa a tu cuenta
        </p>
  
        <!-- Form -->
        <form [formGroup]="form" (ngSubmit)="submit()">

          <div class="flex flex-col gap-4">
            <app-input
              [form_control]="form.controls['email']"
              label="Correo"
            ></app-input>
          
            <app-password
              [form_control]="form.controls['password']"
              label="Contraseña"
            ></app-password>
          </div>
          <!-- Error -->
          <p *ngIf="error()" class="mt-3 text-sm text-red-600">
            {{ error() }}
          </p>
        
          <!-- Button -->
          <app-button
            type="submit"
            [loading]="loading()"
            [customClass]="loading() ? 'mt-5 login-submit-button login-submit-button--loading' : 'mt-5 login-submit-button'"
          >
            Iniciar sesión
          </app-button>
          <button type="submit" class="hidden" aria-hidden="true" tabindex="-1"></button>
        
        </form>
        
  
        <!-- Footer -->
        <div class="mt-6 text-center">
          <a
            href="#"
            class="text-sm text-indigo-600 hover:underline"
          >
            ¿Olvidaste tu contraseña?
          </a>
        </div>
  
      </div>
  
    </div>
  </div>
