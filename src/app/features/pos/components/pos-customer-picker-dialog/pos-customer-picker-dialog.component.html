<div class="modal-container">
  <div class="modal-header">
    <h2>Elegir cliente</h2>
    <button class="close-btn" type="button" (click)="cancel()" aria-label="Cerrar">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path
          d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" />
      </svg>
    </button>
  </div>

  <div class="modal-content">
    <label class="search-label" for="pos-customer-search">Buscar cliente</label>
    <div class="search-field">
      <lucide-icon [img]="Search" class="search-field__icon" />
      <input
        id="pos-customer-search"
        type="search"
        placeholder="Nombre, empresa o correo…"
        [ngModel]="customerSearch()"
        (ngModelChange)="onSearchChange($event)"
        autocomplete="off" />
    </div>

    <button
      type="button"
      class="counter-sale"
      [class.counter-sale--selected]="!selectedCustomerId()"
      (click)="clearCustomer()">
      <span class="counter-sale__icon-wrap">
        <lucide-icon [img]="Store" class="counter-sale__icon" />
      </span>
      <span class="counter-sale__text">
        <span class="counter-sale__title">Venta mostrador</span>
        <span class="counter-sale__subtitle">Sin asignar cliente</span>
      </span>
      @if (!selectedCustomerId()) {
        <span class="counter-sale__check" aria-hidden="true">
          <lucide-icon [img]="Check" class="counter-sale__check-icon" />
        </span>
      }
    </button>

    <p class="list-label">Clientes registrados</p>

    <div class="customer-list">
      @if (loadingCustomers()) {
        <p class="customer-list__empty">Cargando clientes…</p>
      } @else if (filteredCustomers().length === 0) {
        <p class="customer-list__empty">No hay clientes que coincidan con la búsqueda</p>
      } @else {
        @for (customer of filteredCustomers(); track customer.id) {
          <button
            type="button"
            class="customer-row"
            [class.customer-row--selected]="selectedCustomerId() === String(customer.id)"
            (click)="selectCustomer(String(customer.id))">
            <span class="customer-row__avatar">{{ customerInitials(customer) }}</span>
            <span class="customer-row__info">
              <span class="customer-row__name">{{ customerDisplayName(customer) }}</span>
              @if (customer.email) {
                <span class="customer-row__email">{{ customer.email }}</span>
              }
            </span>
            @if (selectedCustomerId() === String(customer.id)) {
              <lucide-icon [img]="Check" class="customer-row__check" />
            }
          </button>
        }
      }
    </div>
  </div>
</div>
