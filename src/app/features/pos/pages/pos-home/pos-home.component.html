<div class="pos-home">
  <div class="pos-header">
    <h1>Punto de Venta</h1>
    
    <!-- Cash Shift Status Bar -->
    <div class="shift-status-bar">
      @if (activeCashShift()) {
        <div class="shift-info">
          <div class="shift-badge active">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
            <span>Turno Activo</span>
          </div>
          <div class="shift-details">
            <span>Apertura: {{ formatCurrency(parseFloat(activeCashShift().initial_cash) || 0) }}</span>
          </div>
        </div>
        <button class="btn-close-shift" (click)="closeCashShift()" [disabled]="checkingShift()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="9" x2="15" y2="15"></line>
            <line x1="15" y1="9" x2="9" y2="15"></line>
          </svg>
          Cerrar Turno
        </button>
      } @else {
        <div class="shift-info">
          <div class="shift-badge inactive">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
            <span>Sin Turno Activo</span>
          </div>
        </div>
        <button class="btn-open-shift" (click)="openCashShift()" [disabled]="checkingShift()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
          </svg>
          {{ checkingShift() ? 'Verificando...' : 'Abrir Turno' }}
        </button>
      }
    </div>
  </div>

  <div class="pos-options">
    <div class="pos-option" (click)="navigateToTakeOrder()">
      <div class="option-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
      </div>
      <h2>Tomar Orden</h2>
      <p>Crear nueva orden de venta</p>
    </div>

    <div class="pos-option" (click)="navigateToPendingOrders()">
      <div class="option-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
      </div>
      <h2>Ver Órdenes</h2>
      <p>Consultar todas las órdenes</p>
    </div>

    <div class="pos-option" (click)="navigateToPayment()">
      <div class="option-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
      </div>
      <h2>Cobrar Orden</h2>
      <p>Procesar pago de orden existente</p>
    </div>
  </div>
</div>
