<div class="filter-bar" role="search" aria-label="Filtros de órdenes de venta">
  <div class="filter-bar__container">
    <div class="filter-bar__field">
      <input type="text" [formControl]="searchControl" placeholder="Buscar..." class="filter-bar__input" />
    </div>

    <div class="filter-bar__field">
      <select [formControl]="dateRangeControl" class="filter-bar__select">
        <option value="">Fecha</option>
        @for (option of dateRangeOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>

    @if (showCustomDateRange) {
      <div class="filter-bar__field">
        <input type="date" [formControl]="dateFromControl" class="filter-bar__input" />
      </div>
      <div class="filter-bar__field">
        <input type="date" [formControl]="dateToControl" class="filter-bar__input" />
      </div>
    }

    <div class="filter-bar__field">
      <select [formControl]="statusControl" class="filter-bar__select">
        <option [value]="null">Todos los estados</option>
        @for (option of statusOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>

    <div class="filter-bar__field">
      <select [formControl]="warehouseControl" class="filter-bar__select">
        <option [value]="null">Todos los almacenes</option>
        @for (warehouse of warehouses; track warehouse.id) {
          <option [value]="warehouse.id">{{ warehouse.name }}</option>
        }
      </select>
    </div>
  </div>
</div>
