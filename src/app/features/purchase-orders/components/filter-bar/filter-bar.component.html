<div class="filter-bar" role="search" aria-label="Filtros de órdenes de compra">
  <div class="filter-bar__container">
    <!-- Search Input -->
    <div class="filter-bar__field">
      <input
        type="text"
        id="search"
        [formControl]="searchControl"
        placeholder="Buscar..."
        class="filter-bar__input"
        aria-label="Buscar órdenes por folio, proveedor o propósito"
      />
    </div>

    <!-- Date Range Dropdown -->
    <div class="filter-bar__field">
      <select
        id="dateRange"
        [formControl]="dateRangeControl"
        class="filter-bar__select"
        aria-label="Filtrar por rango de fecha"
      >
        <option value="">Fecha</option>
        @for (option of dateRangeOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>

    <!-- Custom Date Range (shown when "Rango" is selected) -->
    @if (showCustomDateRange) {
      <div class="filter-bar__field">
        <input
          type="date"
          id="dateFrom"
          [formControl]="dateFromControl"
          class="filter-bar__input"
          aria-label="Filtrar desde fecha"
        />
      </div>

      <div class="filter-bar__field">
        <input
          type="date"
          id="dateTo"
          [formControl]="dateToControl"
          class="filter-bar__input"
          aria-label="Filtrar hasta fecha"
        />
      </div>
    }

    <!-- Status Dropdown -->
    <div class="filter-bar__field">
      <select
        id="status"
        [formControl]="statusControl"
        class="filter-bar__select"
        aria-label="Filtrar por estado de orden"
      >
        <option [value]="null">Todos los estados</option>
        @for (option of statusOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>

    <!-- Warehouse Dropdown -->
    <div class="filter-bar__field">
      <select
        id="warehouse"
        [formControl]="warehouseControl"
        class="filter-bar__select"
        aria-label="Filtrar por almacén"
      >
        <option [value]="null">Todos los almacenes</option>
        @for (warehouse of warehouses; track warehouse.id) {
          <option [value]="warehouse.id">{{ warehouse.name }}</option>
        }
      </select>
    </div>

    @if (hasActiveFilters) {
      <div class="filter-bar__field">
        <button
          type="button"
          class="filter-bar__clear-button"
          (click)="clearFilters()"
          matTooltip="Limpiar filtros"
          aria-label="Limpiar filtros"
        >
          <svg
            class="filter-bar__clear-icon"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path d="M4 6H20L14 13V18L10 20V13L4 6Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
            <path d="M5 19L19 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    }
  </div>
</div>
